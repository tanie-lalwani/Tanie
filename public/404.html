<!--
  GitHub Pages 404.html redirect for React Router SPA
  This script redirects all unknown routes to index.html so client-side routing works.
-->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect: serve index.html for all unknown routes
      // https://github.com/rafgraph/spa-github-pages
      (function () {
        var redirect = sessionStorage.getItem("redirect");
        if (redirect) {
          sessionStorage.removeItem("redirect");
          window.location.replace(redirect);
        } else {
          var pathname = window.location.pathname;
          if (
            pathname !== "/" &&
            pathname !== "/index.html" &&
            pathname !== "/404.html"
          ) {
            var search = window.location.search || "";
            var hash = window.location.hash || "";
            var newUrl =
              "/index.html?redirect=" +
              encodeURIComponent(pathname + search + hash);
            sessionStorage.setItem("redirect", pathname + search + hash);
            window.location.replace(newUrl);
          }
        }
      })();
    </script>
  </head>
  <body>
    <h1>Redirecting…</h1>
    <p>If you are not redirected, <a href="/">click here</a>.</p>
  </body>
</html>
