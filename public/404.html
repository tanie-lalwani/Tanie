<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>404 | Oops | Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500..800&family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #f5fbff;
        --muted: rgba(225, 243, 255, 0.7);
        --line: rgba(214, 240, 255, 0.18);
        --glass: rgba(5, 19, 32, 0.46);
        --accent: #9be8ff;
        --deep: #020812;
        --font-body: "Manrope", "Aptos", "Segoe UI", sans-serif;
        --font-ui: "Inter", "Aptos", "Segoe UI", sans-serif;
        --font-display: "Bodoni Moda", "Didot", "Bodoni 72", "Cambria", serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        font-family: var(--font-body);
        color: var(--ink);
        background: var(--deep);
        cursor:
          url("/water-cursor.svg") 16 5,
          auto;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        background:
          radial-gradient(
            circle at 22% 14%,
            rgba(155, 232, 255, 0.2),
            transparent 29rem
          ),
          radial-gradient(
            circle at 78% 10%,
            rgba(255, 255, 255, 0.12),
            transparent 24rem
          ),
          linear-gradient(
            180deg,
            #7dbbdd 0%,
            #1b6a8b 34%,
            #0b2d48 58%,
            #020812 100%
          );
      }

      a,
      button {
        cursor:
          url("/water-cursor.svg") 16 5,
          pointer;
      }

      .page {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 2rem;
        isolation: isolate;
      }

      .page::before,
      .page::after {
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        content: "";
      }

      .page::before {
        background:
          linear-gradient(
            115deg,
            transparent 0 28%,
            rgba(255, 255, 255, 0.12) 29%,
            transparent 31% 100%
          ),
          linear-gradient(
            68deg,
            transparent 0 58%,
            rgba(176, 232, 255, 0.11) 59%,
            transparent 61% 100%
          );
        opacity: 0.7;
        animation: light-drift 11s ease-in-out infinite alternate;
      }

      .page::after {
        z-index: -1;
        background:
          radial-gradient(
            circle at 48% 90%,
            rgba(155, 232, 255, 0.16),
            transparent 28rem
          ),
          linear-gradient(
            180deg,
            transparent 0 46%,
            rgba(2, 8, 18, 0.16) 47%,
            rgba(2, 8, 18, 0.72) 100%
          );
      }

      .shell {
        width: min(100%, 68rem);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: clamp(1.2rem, 3vw, 2.4rem);
      }

      .home-dot {
        position: relative;
        display: inline-flex;
        width: 1rem;
        height: 1rem;
        border-radius: 999px;
        background: #d7f7ff;
        box-shadow:
          0 0 0 0.45rem rgba(215, 247, 255, 0.12),
          0 0 2rem rgba(155, 232, 255, 0.7);
      }

      .home-dot::after {
        position: absolute;
        inset: -0.48rem;
        border-radius: inherit;
        background: rgba(215, 247, 255, 0.28);
        content: "";
        animation: pulse 1.8s ease-out infinite;
      }

      .status {
        margin: 0;
        color: rgba(235, 248, 255, 0.62);
        font-size: 0.72rem;
        font-weight: 650;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(20rem, 1.08fr);
        gap: clamp(2rem, 6vw, 5rem);
        align-items: center;
        min-width: 0;
      }

      .copy {
        max-width: 36rem;
        min-width: 0;
      }

      .eyebrow {
        margin: 0 0 0.65rem;
        color: rgba(235, 248, 255, 0.58);
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(3.2rem, 11.2vw, 7.7rem);
        font-weight: 500;
        line-height: 0.82;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .message {
        max-width: 31rem;
        margin: 1.4rem 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.8vw, 1.16rem);
        line-height: 1.75;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 2rem;
      }

      .links a {
        display: inline-flex;
        align-items: center;
        min-height: 2.6rem;
        padding: 0.72rem 1rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        background: rgba(245, 251, 255, 0.1);
        box-shadow: 0 1rem 2.5rem rgba(2, 8, 18, 0.12);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-decoration: none;
        transition:
          transform 180ms ease,
          background 180ms ease,
          border-color 180ms ease;
      }

      .links a:hover,
      .links a:focus-visible {
        border-color: rgba(214, 240, 255, 0.44);
        background: rgba(245, 251, 255, 0.18);
        transform: translateY(-2px);
        outline: none;
      }

      .scene {
        position: relative;
        min-height: clamp(25rem, 44vw, 33rem);
      }

      .oops {
        position: absolute;
        top: 24%;
        left: 82%;
        z-index: 4;
        display: grid;
        min-width: 5.2rem;
        min-height: 3.1rem;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        background: rgba(245, 251, 255, 0.9);
        transform: translateX(-50%) rotate(-5deg);
        color: rgba(18, 52, 72, 0.9);
        font-family: var(--font-display);
        font-size: clamp(1.3rem, 2.7vw, 2.2rem);
        font-weight: 500;
        line-height: 0.9;
        box-shadow: 0 0.9rem 2rem rgba(2, 8, 18, 0.18);
        animation: oops-float 4.8s ease-in-out infinite;
      }

      .oops::before,
      .oops::after {
        position: absolute;
        border-radius: 999px;
        background: rgba(245, 251, 255, 0.82);
        content: "";
      }

      .oops::before {
        right: 78%;
        top: 82%;
        width: 0.82rem;
        height: 0.82rem;
      }

      .oops::after {
        right: 96%;
        top: 106%;
        width: 0.45rem;
        height: 0.45rem;
      }

      .ship-wrap {
        position: absolute;
        right: 2%;
        bottom: 20%;
        width: min(88%, 35rem);
        height: 18rem;
        transform-origin: 54% 72%;
        animation: sub-hit 6.2s ease-in-out infinite;
      }

      .sub-body {
        position: absolute;
        left: 8%;
        right: 6%;
        bottom: 4rem;
        height: 7.2rem;
        border-radius: 4rem/2.4rem;
        background: linear-gradient(90deg, #3b525b, #1b2b33 60%);
        box-shadow:
          inset 0 1.2rem 0 rgba(255, 255, 255, 0.03),
          0 1.4rem 2.2rem rgba(2, 8, 18, 0.18);
        overflow: visible;
      }

      .conning {
        position: absolute;
        left: 52%;
        bottom: 8.6rem;
        width: 5.6rem;
        height: 3.1rem;
        border-radius: 1.2rem 1.2rem 0.6rem 0.6rem;
        background: linear-gradient(180deg, #dbeef6, #9bc6d3);
        transform: translateX(-40%);
        box-shadow: 0 0.4rem 0 rgba(2, 8, 18, 0.08);
      }

      .hatch {
        position: absolute;
        left: 44%;
        bottom: 10.4rem;
        width: 1.1rem;
        height: 1.1rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.85);
        transform: translateX(-50%);
        border: 0.12rem solid rgba(13, 94, 125, 0.6);
      }

      .propeller {
        position: absolute;
        right: 4%;
        bottom: 6.2rem;
        width: 2.4rem;
        height: 2.4rem;
        border-radius: 50%;
        background:
          radial-gradient(
            circle at 40% 40%,
            rgba(255, 255, 255, 0.15),
            transparent 42%
          ),
          rgba(20, 40, 46, 0.9);
        box-shadow: 0 0.2rem 0 rgba(2, 8, 18, 0.12);
      }

      .portholes {
        position: absolute;
        left: 28%;
        bottom: 6.6rem;
        display: flex;
        gap: 1.35rem;
        transform: translateX(-2%);
      }

      .portholes span {
        width: 0.86rem;
        height: 0.86rem;
        border: 0.12rem solid rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        background: rgba(5, 40, 56, 0.86);
      }

      .waterline {
        position: absolute;
        right: -4%;
        bottom: 22%;
        left: -4%;
        z-index: 3;
        height: 7.2rem;
        background:
          radial-gradient(
            2.4rem 1.2rem at 8% 22%,
            rgba(255, 255, 255, 0.48),
            transparent 72%
          ),
          radial-gradient(
            3rem 1.4rem at 42% 20%,
            rgba(255, 255, 255, 0.32),
            transparent 72%
          ),
          radial-gradient(
            2.5rem 1.2rem at 78% 28%,
            rgba(255, 255, 255, 0.38),
            transparent 72%
          ),
          linear-gradient(
            180deg,
            rgba(126, 218, 245, 0.82),
            rgba(8, 57, 86, 0.86)
          );
        clip-path: polygon(
          0 22%,
          8% 16%,
          18% 25%,
          29% 14%,
          42% 23%,
          55% 15%,
          68% 24%,
          80% 16%,
          91% 23%,
          100% 15%,
          100% 100%,
          0 100%
        );
        animation: wave 4.2s ease-in-out infinite;
      }

      .bubbles {
        position: absolute;
        right: 10%;
        bottom: 17%;
        z-index: 4;
        width: 13rem;
        height: 15rem;
        pointer-events: none;
      }

      .bubbles span {
        position: absolute;
        bottom: 0;
        display: block;
        width: var(--size);
        height: var(--size);
        left: var(--left);
        border: 1px solid rgba(235, 250, 255, 0.62);
        border-radius: 50%;
        background: rgba(235, 250, 255, 0.12);
        animation: bubble-rise var(--speed) ease-in infinite;
        animation-delay: var(--delay);
      }

      .floor {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: -1;
        height: 18vh;
        background:
          radial-gradient(
            10rem 3rem at 18% 100%,
            rgba(192, 224, 210, 0.16),
            transparent 70%
          ),
          radial-gradient(
            13rem 4rem at 74% 100%,
            rgba(155, 232, 255, 0.11),
            transparent 72%
          ),
          linear-gradient(180deg, transparent, rgba(2, 8, 18, 0.84));
      }

      @keyframes pulse {
        to {
          opacity: 0;
          transform: scale(2.2);
        }
      }

      @keyframes light-drift {
        from {
          transform: translateX(-4%);
        }

        to {
          transform: translateX(4%);
        }
      }

      @keyframes oops-float {
        0%,
        100% {
          transform: translateX(-50%) translateY(0) rotate(-4deg);
        }

        50% {
          transform: translateX(-50%) translateY(-1.15rem) rotate(3deg);
        }
      }

      @keyframes sub-hit {
        0%,
        100% {
          transform: translateX(0) translateY(0) rotate(0deg);
        }

        10% {
          transform: translateX(-0.8rem) translateY(0.15rem) rotate(-6deg);
        }

        25% {
          transform: translateX(1.2rem) translateY(-0.25rem) rotate(8deg);
        }

        45% {
          transform: translateX(-0.4rem) translateY(0.08rem) rotate(-3deg);
        }

        65% {
          transform: translateX(0.15rem) translateY(-0.05rem) rotate(2deg);
        }

        85% {
          transform: translateX(0) translateY(0) rotate(0deg);
        }
      }

      @keyframes wave {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(0.5rem);
        }
      }

      @keyframes bubble-rise {
        0% {
          opacity: 0;
          transform: translateY(0) scale(0.72);
        }

        18% {
          opacity: 0.92;
        }

        100% {
          opacity: 0;
          transform: translateY(-12rem) translateX(1.2rem) scale(1.18);
        }
      }

      @media (max-width: 820px) {
        .page {
          align-items: start;
          padding: 1.2rem;
        }

        .shell,
        .content,
        .copy {
          width: 100%;
          max-width: 100%;
        }

        .topbar {
          align-items: flex-start;
        }

        .status {
          max-width: 9.5rem;
          text-align: right;
          font-size: 0.62rem;
          letter-spacing: 0.14em;
          line-height: 1.45;
        }

        .content {
          grid-template-columns: 1fr;
          gap: 1.8rem;
        }

        h1 {
          font-size: clamp(3.6rem, 14vw, 4.2rem);
        }

        .message {
          max-width: 100%;
          font-size: 0.96rem;
        }

        .scene {
          min-height: 23rem;
          margin-right: -1.2rem;
          margin-left: -1.2rem;
          overflow: hidden;
          padding-right: 1.2rem;
          padding-left: 1.2rem;
          order: -1;
        }

        .ship-wrap {
          right: -8%;
          bottom: 16%;
          width: min(105%, 31rem);
        }

        .oops {
          left: 80%;
          top: 21%;
        }

        .links {
          display: grid;
          grid-template-columns: 1fr;
          width: 100%;
        }

        .links a {
          width: 100%;
          justify-content: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <nav class="topbar" aria-label="404 navigation">
          <a class="home-dot" href="/" aria-label="Go home"></a>
          <p class="status">Error 404 | uncharted water</p>
        </nav>

        <section class="content" aria-labelledby="page-title">
          <div class="copy">
            <p class="eyebrow">Page not found</p>
            <h1 id="page-title">Lost at sea.</h1>
            <p class="message">
              Oops, this page has slipped beneath the surface. Pick a safer
              current and head back to one of the working parts of the site.
            </p>

            <div class="links" aria-label="Pages to visit">
              <a href="/">Home</a>
              <a href="/#about">About</a>
              <a href="/#projects">Projects</a>
              <a href="/#contact">Contact</a>
              <a href="/qna">Interview me</a>
            </div>
          </div>

          <div class="scene" aria-hidden="true">
            <div class="oops">Oops</div>
            <div class="ship-wrap" aria-hidden="true">
              <div class="sub-body"></div>
              <div class="conning"></div>
              <div class="hatch" aria-hidden="true"></div>
              <div class="propeller" aria-hidden="true"></div>
              <div class="portholes" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
            <div class="waterline"></div>
            <div class="bubbles">
              <span
                style="
                  --left: 6%;
                  --size: 0.8rem;
                  --speed: 4.8s;
                  --delay: -0.4s;
                "
              ></span>
              <span
                style="
                  --left: 28%;
                  --size: 0.55rem;
                  --speed: 3.9s;
                  --delay: -1.8s;
                "
              ></span>
              <span
                style="--left: 54%; --size: 1rem; --speed: 5.2s; --delay: -2.5s"
              ></span>
              <span
                style="
                  --left: 76%;
                  --size: 0.62rem;
                  --speed: 4.4s;
                  --delay: -1s;
                "
              ></span>
            </div>
          </div>
        </section>
      </div>
      <div class="floor" aria-hidden="true"></div>
    </main>
  </body>
</html>
