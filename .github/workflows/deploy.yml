name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        env:
          CUSTOM_DOMAIN: tanie.me
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          temp_dir="$(mktemp -d)"
          cp -R dist/. "$temp_dir/"
          git switch --orphan gh-pages-deploy
          git rm -rf . || true
          cp -R "$temp_dir"/. .
          touch .nojekyll
          printf "%s\n" "$CUSTOM_DOMAIN" > CNAME
          git add .
          git commit -m "Deploy to GitHub Pages" || exit 0
          git push --force origin gh-pages-deploy:gh-pages
